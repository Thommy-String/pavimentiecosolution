<link rel="stylesheet" href="/cookie-banner.css" />
</head>

<body>
  <div id="root">
    <!-- Skeleton loader che simula la struttura reale della Hero -->
    <div id="initial-loader" style="min-height:100vh;background:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;">
      <!-- Fake header bar -->
      <div style="height:56px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;padding:0 16px;">
        <div style="width:32px;height:32px;border-radius:8px;background:#f3f4f6;"></div>
      </div>
      <!-- Fake Hero content -->
      <div style="max-width:1200px;margin:0 auto;padding:48px 24px;">
        <!-- Fake badge -->
        <div style="width:200px;height:24px;background:#f3f4f6;border-radius:12px;margin-bottom:24px;animation:pulse 1.5s ease-in-out infinite;"></div>
        <!-- Fake title lines -->
        <div style="width:80%;height:36px;background:#f3f4f6;border-radius:8px;margin-bottom:12px;animation:pulse 1.5s ease-in-out infinite;"></div>
        <div style="width:60%;height:36px;background:#f3f4f6;border-radius:8px;margin-bottom:24px;animation:pulse 1.5s ease-in-out infinite;"></div>
        <!-- Fake subtitle -->
        <div style="width:90%;height:16px;background:#f9fafb;border-radius:4px;margin-bottom:8px;animation:pulse 1.5s ease-in-out infinite;"></div>
        <div style="width:70%;height:16px;background:#f9fafb;border-radius:4px;margin-bottom:32px;animation:pulse 1.5s ease-in-out infinite;"></div>
        <!-- Fake CTA buttons -->
        <div style="display:flex;gap:12px;">
          <div style="width:180px;height:48px;background:#1a1a1a;border-radius:12px;"></div>
          <div style="width:160px;height:48px;background:#fff;border:2px solid #1a1a1a;border-radius:12px;"></div>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}</style>
    </div>
  </div>
  <!-- Cookie Banner: lo script PRIMA del banner definisce le funzioni globali -->
  <script>
  function _cb_set(n,v){var d=new Date();d.setTime(d.getTime()+31536e6);document.cookie=n+'='+v+';expires='+d.toUTCString()+';path=/;SameSite=Lax';}
  function _cb_hide(){var b=document.getElementById('cookie-banner');if(b)b.style.cssText='display:none!important';}
  function _cb_accept(){_cb_hide();_cb_set('gdpr_consent','accepted');}
  function _cb_decline(){_cb_hide();_cb_set('gdpr_consent','declined');}
  // Se il cookie esiste già, nascondi subito (prima ancora che il CSS carichi)
  if(document.cookie.indexOf('gdpr_consent=')!==-1){document.write('<style>#cookie-banner{display:none!important}</style>');}
  </script>
  <!-- Cookie Banner HTML -->
  <div id="cookie-banner">
    <p>Facendo clic su «Accetta», acconsenti alla memorizzazione dei cookie sul tuo dispositivo per scopi funzionali, analitici e pubblicitari. <a href="/privacy-policy">Informativa sulla Privacy</a>.</p>
    <div class="cookie-buttons">
      <button id="accept-cookies" onclick="_cb_accept()">Accetta</button>
      <button id="decline-cookies" onclick="_cb_decline()">Rifiuta</button>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
